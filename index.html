<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>命理天机</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div class="title-plaque">
        <span class="brand-seal" aria-hidden="true">命</span>
        <div>
          <h1>命理天机</h1>
          <p>知命而不宿命</p>
        </div>
      </div>
    </header>

    <main class="app-main" aria-label="命理天机四柱排盘">
      <section id="home-view" class="view home-view is-active" aria-label="业务入口">
        <div class="home-summary">
          <span class="summary-kicker">THE MYSTICAL JOURNEY</span>
          <h2>请选择所问之事</h2>
          <p>以四柱原局为底，合参 2026 丙午流年，展开严谨、克制、可复核的子平批断。</p>
        </div>

        <section class="module-grid" aria-label="四大业务入口">
          <button class="module-card" type="button" data-view="analysis-view" data-category="学业">
            <span class="module-icon" aria-hidden="true">文</span>
            <span class="module-title">学业分析</span>
            <span class="module-desc">从印星、食伤与文昌取象，观学习驱动力。</span>
          </button>

          <button class="module-card" type="button" data-view="analysis-view" data-category="事业">
            <span class="module-icon" aria-hidden="true">策</span>
            <span class="module-title">事业运势</span>
            <span class="module-desc">以财官印授为纲，评估执行与承载之势。</span>
          </button>

          <button class="module-card" type="button" data-view="analysis-view" data-category="婚姻">
            <span class="module-icon" aria-hidden="true">缘</span>
            <span class="module-title">婚姻走势</span>
            <span class="module-desc">合参日支夫妻宫，辨沟通与情感表达。</span>
          </button>

          <button class="module-card" type="button" data-view="chart-view" data-category="专业">
            <span class="module-icon" aria-hidden="true">盘</span>
            <span class="module-title">命理精盘</span>
            <span class="module-desc">纯净排盘，完整呈现十神、星运与众星罗列。</span>
          </button>
        </section>
      </section>

      <section id="analysis-view" class="view business-view" data-category="学业" data-mode="ai" hidden>
        <nav class="detail-topbar" aria-label="学术批断导航">
          <button class="back-button" type="button" aria-label="返回首页">
            <span aria-hidden="true">‹</span>
          </button>
          <div>
            <span id="analysis-kicker" class="topbar-kicker">文昌问学</span>
            <h2 id="analysis-title">学业分析</h2>
          </div>
        </nav>

        <section class="input-panel" aria-label="批算条件">
          <p id="analysis-note" class="panel-note">填入诞生良辰，合参 2026 丙午流年，剖析学习结构与用神消长。</p>
          <label class="field">
            <span>诞生良辰</span>
            <input class="birth-time" type="datetime-local" name="birthTime" aria-label="诞生良辰">
          </label>

          <label class="field">
            <span>性别</span>
            <select class="gender-select" name="gender" aria-label="性别">
              <option value="">请选择性别</option>
              <option value="male">男</option>
              <option value="female">女</option>
            </select>
          </label>

          <button class="primary-button start-button" type="button">开启批算</button>
        </section>

        <section class="chart-section is-empty" aria-label="四柱极简彩盘">
          <div class="section-heading">
            <span>Four Pillars</span>
            <h3>四柱彩盘</h3>
          </div>
          <div class="result-box" aria-label="四柱彩盘"></div>
        </section>

        <section class="academic-section is-empty" aria-label="学术批断">
          <div class="ritual-status" aria-live="polite">接入人生中...</div>

          <div class="scholar-grid">
            <article class="scholar-card">
              <span class="card-kicker">2026 丙午</span>
              <h3>运势总结</h3>
              <div class="academic-output" data-output="summary">批算完成后在此展开。</div>
            </article>

            <article class="scholar-card">
              <span class="card-kicker">干支宫位</span>
              <h3>盘位星位</h3>
              <div class="academic-output" data-output="positions">批算完成后在此展开。</div>
            </article>

            <article class="scholar-card inquiry-card">
              <span class="card-kicker">局部焦点</span>
              <h3>我要追问</h3>
              <textarea class="follow-up-input" rows="4" placeholder="写下一个具体问题，如：今年备考该如何调整节奏？"></textarea>
              <button class="follow-up-button" type="button">定向追问</button>
              <div class="follow-up-result" aria-live="polite"></div>
            </article>
          </div>
        </section>
      </section>

      <section id="chart-view" class="view business-view" data-category="专业" data-mode="tool" hidden>
        <nav class="detail-topbar" aria-label="命理精盘导航">
          <button class="back-button" type="button" aria-label="返回首页">
            <span aria-hidden="true">‹</span>
          </button>
          <div>
            <span class="topbar-kicker">四柱全盘</span>
            <h2>命理精盘</h2>
          </div>
        </nav>

        <section class="input-panel" aria-label="专业排盘条件">
          <p class="panel-note">此页只做专业排盘，不唤起任何批注。</p>
          <label class="field">
            <span>诞生良辰</span>
            <input class="birth-time" type="datetime-local" name="birthTime" aria-label="诞生良辰">
          </label>

          <label class="field">
            <span>性别</span>
            <select class="gender-select" name="gender" aria-label="性别">
              <option value="">请选择性别</option>
              <option value="male">男</option>
              <option value="female">女</option>
            </select>
          </label>

          <button class="primary-button start-button" type="button">开始排盘</button>
        </section>

        <section class="chart-section is-empty" aria-label="完整命理精盘">
          <div class="section-heading">
            <span>Professional Data</span>
            <h3>命理精盘</h3>
          </div>
          <div class="result-box" aria-label="完整四柱精盘"></div>
          <div class="shen-sha-box" aria-label="全量神煞详解"></div>
        </section>
      </section>
    </main>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/lunar-javascript/1.7.4/lunar.min.js"></script>
  <script src="lunar.min.js"></script>
  <script src="main.js"></script>
</body>
</html>
