<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>命理天机</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div class="title-plaque">
        <span class="brand-seal" aria-hidden="true">命</span>
        <div>
          <h1>命理天机</h1>
          <p>知命而不宿命</p>
        </div>
      </div>
    </header>

    <main class="app-main" aria-label="命理天机单页排盘">
      <section class="home-summary" aria-label="业务入口说明">
        <span class="summary-kicker">THE MYSTICAL JOURNEY</span>
        <h2>请选择所问之事</h2>
        <p>以极简良辰接入命盘，展开一场安静的自省之旅。</p>
      </section>

      <section class="module-grid" aria-label="业务入口">
        <button class="module-card is-selected" type="button" data-category="学业">
          <span class="module-icon" aria-hidden="true">文</span>
          <span class="module-title">学业分析</span>
          <span class="module-desc">洞察文昌星动向，剖析认知模式与专注潜力。</span>
        </button>

        <button class="module-card" type="button" data-category="事业">
          <span class="module-icon" aria-hidden="true">官</span>
          <span class="module-title">事业运势</span>
          <span class="module-desc">解析官杀财印，评估职场领导力与行业契合度。</span>
        </button>

        <button class="module-card" type="button" data-category="婚姻">
          <span class="module-icon" aria-hidden="true">缘</span>
          <span class="module-title">婚姻走势</span>
          <span class="module-desc">探索红鸾羁绊，理解亲密关系中的情感逻辑。</span>
        </button>

        <button class="module-card" type="button" data-category="专业">
          <span class="module-icon" aria-hidden="true">盘</span>
          <span class="module-title">专业排盘</span>
          <span class="module-desc">纯净生成五行、四柱与神煞，不开启批注干扰。</span>
        </button>

        <div class="module-card module-card-muted" aria-label="身心节律模块即将开放">
          <span class="module-icon" aria-hidden="true">息</span>
          <span class="module-title">身心节律</span>
          <span class="module-desc">五行调和与日常能量节奏，即将开放。</span>
        </div>

        <div class="module-card module-card-muted" aria-label="人际关系模块即将开放">
          <span class="module-icon" aria-hidden="true">合</span>
          <span class="module-title">人际关系</span>
          <span class="module-desc">贵人方位与沟通习性，即将开放。</span>
        </div>
      </section>

      <section class="input-panel" aria-label="排盘条件">
        <div class="consultation-strip">
          <span class="detail-label">当前所问</span>
          <strong id="detail-title">学业分析</strong>
        </div>

        <label class="field">
          <span>诞生良辰</span>
          <input id="birth-time" type="datetime-local" name="birthTime" aria-label="诞生良辰">
        </label>

        <div class="filter-grid">
          <label class="field">
            <span>性别</span>
            <select name="gender">
              <option value="">请选择性别</option>
              <option value="male">男</option>
              <option value="female">女</option>
            </select>
          </label>

          <label class="field optional-field">
            <span>历法源流</span>
            <select name="calendar">
              <option value="solar">公历</option>
              <option value="lunar">农历</option>
            </select>
          </label>

          <label class="field optional-field">
            <span>出生方域</span>
            <select name="region">
              <option value="">请选择方域</option>
              <option value="china">中国大陆</option>
              <option value="other">其他地区</option>
            </select>
          </label>
        </div>

        <button id="start-button" class="primary-button" type="button">开始排盘</button>
      </section>

      <section id="chart-section" class="chart-section is-empty" aria-label="命理精盘展示区">
        <div class="section-heading">
          <span>Professional Data</span>
          <h3>命理精盘</h3>
        </div>

        <div id="result-box" class="result-box" aria-label="四柱精盘"></div>

        <div id="shen-sha-box" class="shen-sha-box" aria-label="神煞详解"></div>
      </section>

      <section id="ai-section" class="ai-section is-empty" aria-label="大师批注">
        <div id="ritual-status" class="ritual-status" aria-live="polite">接入人生中...</div>
        <button id="ai-button" class="ai-button" type="button" disabled>揭示命运玄机</button>

        <div id="ai-result" class="ai-result" aria-live="polite"></div>
      </section>
    </main>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/lunar-javascript/1.7.4/lunar.min.js"></script>
  <script src="lunar.min.js"></script>
  <script src="main.js"></script>
</body>
</html>
