<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>命理天机盘</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div class="title-plaque">
        <h1>命理天机盘</h1>
      </div>
    </header>

    <main class="app-main">
      <section id="home-view" class="view home-view is-active" aria-label="业务入口">
        <div class="home-summary">
          <span class="summary-kicker">命局问事入口</span>
          <h2>请选择所问之事</h2>
          <p>以生辰定盘，随所问之事展开批注。</p>
        </div>

        <div class="module-grid">
          <button class="module-card" type="button" data-category="学业">
            <span class="module-icon" aria-hidden="true">🎓</span>
            <span class="module-title">学业分析</span>
            <span class="module-desc">观文昌印星之气</span>
          </button>

          <button class="module-card" type="button" data-category="事业">
            <span class="module-icon" aria-hidden="true">💼</span>
            <span class="module-title">事业运势</span>
            <span class="module-desc">察官杀财星格局</span>
          </button>

          <button class="module-card" type="button" data-category="婚姻">
            <span class="module-icon" aria-hidden="true">♡</span>
            <span class="module-title">婚姻走势</span>
            <span class="module-desc">问夫妻宫与桃花</span>
          </button>

          <div class="module-card module-card-muted" aria-label="更多模块即将开放">
            <span class="module-icon" aria-hidden="true">＋</span>
            <span class="module-title">更多模块</span>
            <span class="module-desc">小六壬诸法待启</span>
          </div>
        </div>
      </section>

      <section id="detail-view" class="view detail-view" aria-label="业务排盘页面">
        <div class="detail-topbar">
          <button id="back-button" class="back-button" type="button" aria-label="返回首页">‹</button>
          <div>
            <span class="detail-label">当前所问</span>
            <h2 id="detail-title">学业分析</h2>
          </div>
        </div>

        <section class="input-panel" aria-label="排盘条件">
          <label class="field">
            <span>诞生良辰</span>
            <input id="birth-time" type="datetime-local" name="birthTime" aria-label="诞生良辰">
          </label>

          <div class="filter-grid">
            <label class="field">
              <span>性别</span>
              <select name="gender">
                <option value="">请选择性别</option>
                <option value="male">男</option>
                <option value="female">女</option>
              </select>
            </label>

            <label class="field">
              <span>历法源流</span>
              <select name="calendar">
                <option value="solar">公历</option>
                <option value="lunar">农历</option>
              </select>
            </label>

            <label class="field">
              <span>出生方域</span>
              <select name="region">
                <option value="">请选择方域</option>
                <option value="china">中国大陆</option>
                <option value="other">其他地区</option>
              </select>
            </label>
          </div>
        </section>

        <section class="action-panel">
          <button id="start-button" class="primary-button" type="button">开始排盘</button>

          <div id="result-box" class="result-box" aria-label="排盘结果展示区">
            <p>命盘将在此呈现</p>
          </div>

          <button id="ai-button" class="ai-button" type="button" disabled>揭示命运玄机</button>

          <div id="ai-result" class="ai-result" aria-live="polite">
            先生批注将在此显现
          </div>
        </section>
      </section>
    </main>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/lunar-javascript/1.7.4/lunar.min.js"></script>
  <script src="main.js"></script>
</body>
</html>
